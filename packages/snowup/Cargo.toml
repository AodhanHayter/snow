[package]
name = "snowup"
version = "0.1.0"
edition = "2021"
description = "Flake update + rebuild driver with fzf-based selection"
license = "MIT"

[[bin]]
name = "snowup"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

[profile.release]
lto = true
codegen-units = 1
strip = true
