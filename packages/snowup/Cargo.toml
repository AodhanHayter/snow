[package]
name = "snowup"
version = "0.1.0"
edition = "2021"
description = "TUI for reviewing flake.lock updates and rebuilding the modernage NixOS/Darwin host"
license = "MIT"

[[bin]]
name = "snowup"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.28"
ratatui = "0.29"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

[profile.release]
lto = true
codegen-units = 1
strip = true
